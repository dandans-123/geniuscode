<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E3A8A"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#60A5FA"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.3" r="0.5">
      <stop offset="0%" stop-color="#2563EB" stop-opacity=".35"/>
      <stop offset="100%" stop-color="#2563EB" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0 L0 0 0 40" stroke="rgba(255,255,255,0.05)" stroke-width="1" fill="none"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <!-- MM badge -->
  <g transform="translate(600,200)">
    <rect x="-60" y="-60" width="120" height="120" rx="24" fill="url(#brand)"/>
    <text x="0" y="22" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif" font-size="64" font-weight="800" fill="#fff" letter-spacing="-2">MM</text>
  </g>
  <text x="600" y="380" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif" font-size="84" font-weight="800" fill="#fff" letter-spacing="-2">ModelMux</text>
  <text x="600" y="438" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif" font-size="28" font-weight="500" fill="#94A3B8">一行代码，让每个请求跑在对的模型上</text>
  <text x="600" y="478" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif" font-size="22" font-weight="500" fill="#64748B">One line of code. Every call on the right model.</text>
  <!-- decorative dots -->
  <circle cx="200" cy="120" r="4" fill="#3B82F6" opacity=".6"/>
  <circle cx="1000" cy="180" r="6" fill="#60A5FA" opacity=".5"/>
  <circle cx="180" cy="500" r="5" fill="#3B82F6" opacity=".4"/>
  <circle cx="1020" cy="510" r="4" fill="#60A5FA" opacity=".5"/>
  <!-- bottom brand bar -->
  <rect x="0" y="600" width="1200" height="30" fill="#3B82F6"/>
  <text x="600" y="620" text-anchor="middle" font-family="-apple-system,'SF Mono',monospace" font-size="14" font-weight="600" fill="#fff" letter-spacing="3">MODELMUX.AI</text>
</svg>
